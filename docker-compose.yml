
version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: emotion_support_postgres
    environment:
      POSTGRES_DB: emotion_support
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - emotion_support_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: emotion_support_redis
    ports:
      - "6379:6379"

volumes:
  emotion_support_pgdata:
